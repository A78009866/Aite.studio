name: Build Custom KDE macOS ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            xorriso \
            squashfs-tools \
            mtools \
            git

      - name: Configure Live Build Environment
        run: |
          mkdir -p build-os
          cd build-os

          sudo lb config \
            --distribution bookworm \
            --architecture amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --system live \
            --iso-application "Custom macOS KDE Linux" \
            --iso-volume "CUSTOM_OS"

          sudo chown -R $USER:$USER .

      - name: Add Packages
        run: |
          mkdir -p build-os/config/package-lists

          cat << 'EOF' > build-os/config/package-lists/desktop.list.chroot
          kde-plasma-desktop
          sddm
          konsole
          dolphin
          network-manager-kde
          curl
          wget
          git
          kvantum
          plasma-nm
          plasma-workspace
          EOF

      - name: Inject macOS Theme Hook
        run: |
          mkdir -p build-os/config/hooks/live

          cat << 'EOF' > build-os/config/hooks/live/99-macos-theme.chroot
          #!/bin/bash
          set -e

          echo "Installing WhiteSur KDE Theme..."

          git clone https://github.com/vinceliuice/WhiteSur-kde.git /tmp/WhiteSur-kde
          cd /tmp/WhiteSur-kde
          ./install.sh

          echo "Installing WhiteSur Icons..."

          git clone https://github.com/vinceliuice/WhiteSur-icon-theme.git /tmp/WhiteSur-icons
          cd /tmp/WhiteSur-icons
          ./install.sh -a

          rm -rf /tmp/WhiteSur-kde
          rm -rf /tmp/WhiteSur-icons
          EOF

          chmod +x build-os/config/hooks/live/99-macos-theme.chroot

      - name: Build ISO
        run: |
          cd build-os
          sudo lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-kde-macos-iso
          path: build-os/*.iso
