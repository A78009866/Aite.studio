name: Build Custom KDE macOS ISO

on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من واجهة GitHub Actions

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free up disk space (Optional but recommended)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso squashfs-tools mtools git

      - name: Configure Live Build Environment
        run: |
          mkdir -p build-os
          cd build-os
          # إعداد التوزيعة لتكون مبنية على Debian Bookworm
          sudo lb config \
            --distribution bookworm \
            --architecture amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --system live \
            --iso-application "Custom macOS KDE Linux" \
            --iso-volume "CUSTOM_OS"

      - name: Add Packages (KDE Minimal & Utils)
        run: |
          mkdir -p build-os/config/package-lists
          # وضع الحزم المطلوبة لسطح المكتب والأدوات
          cat << 'EOF' > build-os/config/package-lists/desktop.list.chroot
          kde-plasma-desktop
          sddm
          konsole
          dolphin
          network-manager-kde
          curl
          wget
          git
          kvantum
          EOF

      - name: Inject macOS Theme Hook
        run: |
          mkdir -p build-os/config/hooks/live
          # هذا السكربت سيتم تنفيذه داخل النظام الجديد أثناء البناء (chroot)
          cat << 'EOF' > build-os/config/hooks/live/99-macos-theme.chroot
          #!/bin/bash
          echo "=> Installing macOS Theme (WhiteSur)..."
          git clone https://github.com/vinceliuice/WhiteSur-kde.git /tmp/WhiteSur-kde
          cd /tmp/WhiteSur-kde
          # تثبيت الثيم بشكل عام لكل المستخدمين
          sudo ./install.sh
          
          echo "=> Installing macOS Icons..."
          git clone https://github.com/vinceliuice/WhiteSur-icon-theme.git /tmp/WhiteSur-icons
          cd /tmp/WhiteSur-icons
          sudo ./install.sh -a
          
          # تنظيف الملفات المؤقتة
          rm -rf /tmp/WhiteSur-kde /tmp/WhiteSur-icons
          EOF
          
          # جعل السكربت قابلاً للتنفيذ
          chmod +x build-os/config/hooks/live/99-macos-theme.chroot

      - name: Build the ISO
        run: |
          cd build-os
          # بدء عملية البناء (قد تستغرق 20-30 دقيقة)
          sudo lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-kde-macos-iso
          path: build-os/*.iso
